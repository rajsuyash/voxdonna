<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — Voxdonna AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --text-primary: #f5f5f7;
      --text-secondary: rgba(245, 245, 247, 0.6);
      --copper: #c17f59;
      --copper-light: #d4a574;
      --teal: #2d5c4f;
      --surface: rgba(255,255,255,0.03);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 48px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-logo {
      font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
      color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }
    .nav-logo span { color: var(--copper); }

    .nav-back {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--copper-light); }
    .nav-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ─── ARTICLE LAYOUT ─── */
    .article-hero {
      padding: 140px 48px 60px;
      max-width: 800px;
      margin: 0 auto;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .article-category {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--copper);
      background: rgba(193,127,89,0.1);
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid rgba(193,127,89,0.12);
    }

    .article-date, .article-read-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }

    .article-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--text-secondary);
    }

    .article-hero h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .article-hero .article-desc {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-weight: 300;
    }

    .article-divider {
      max-width: 800px;
      margin: 0 auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(193,127,89,0.2), transparent);
    }

    /* ─── ARTICLE CONTENT ─── */
    .article-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 48px 120px;
      font-size: 17px;
      line-height: 1.8;
      color: rgba(245,245,247,0.85);
    }

    .article-content h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 56px 0 20px;
      color: var(--text-primary);
    }

    .article-content h3 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 40px 0 16px;
      color: var(--text-primary);
    }

    .article-content h4 {
      font-size: 18px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: var(--text-primary);
    }

    .article-content p {
      margin-bottom: 20px;
    }

    .article-content strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .article-content a {
      color: var(--copper-light);
      text-decoration: underline;
      text-decoration-color: rgba(193,127,89,0.3);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s;
    }

    .article-content a:hover {
      text-decoration-color: var(--copper-light);
    }

    .article-content ul, .article-content ol {
      margin: 0 0 20px 24px;
    }

    .article-content li {
      margin-bottom: 8px;
    }

    .article-content blockquote {
      border-left: 3px solid var(--copper);
      padding: 16px 24px;
      margin: 28px 0;
      background: rgba(193,127,89,0.04);
      border-radius: 0 12px 12px 0;
      font-style: italic;
      color: var(--text-secondary);
    }

    .article-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9em;
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--copper-light);
    }

    .article-content pre {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 24px 0;
    }

    .article-content pre code {
      background: none;
      padding: 0;
      color: rgba(245,245,247,0.8);
    }

    .article-content hr {
      border: none;
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 40px 0;
    }

    .article-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 15px;
    }

    .article-content th {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid rgba(193,127,89,0.2);
      color: var(--copper-light);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .article-content td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .article-content tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .article-content img {
      max-width: 100%;
      border-radius: 12px;
      margin: 24px 0;
    }

    /* ─── LANGUAGE SWITCHER ─── */
    .lang-switch {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 3px;
    }

    .lang-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: none;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
    }

    .lang-btn.active {
      background: rgba(193,127,89,0.15);
      color: var(--copper-light);
    }

    .lang-btn:hover:not(.active) {
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
    }

    /* ─── FOOTER BAR ─── */
    .article-footer {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 48px 80px;
    }

    .article-footer-inner {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--copper-light);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: gap 0.2s;
    }
    .back-link:hover { gap: 12px; }
    .back-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ─── LOADING ─── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
    }

    .loading::after {
      content: '';
      width: 20px; height: 20px;
      border: 2px solid rgba(193,127,89,0.2);
      border-top-color: var(--copper);
      border-radius: 50%;
      margin-left: 12px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      nav { padding: 0 16px; height: 48px; }
      .article-hero { padding: 100px 16px 40px; }
      .article-hero h1 { font-size: clamp(24px, 7vw, 36px); }
      .article-hero .article-desc { font-size: 15px; }
      .article-content { padding: 32px 16px 80px; font-size: 16px; }
      .article-content h2 { font-size: 22px; margin-top: 40px; }
      .article-content h3 { font-size: 18px; }
      .article-footer { padding: 0 16px 60px; }
      .lang-switch { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 8L12 14L22 8L12 2Z" fill="#c17f59"/>
        <path d="M2 16L12 22L22 16" stroke="#c17f59" stroke-width="2" fill="none"/>
        <path d="M2 12L12 18L22 12" stroke="#c17f59" stroke-width="2" fill="none" opacity="0.5"/>
      </svg>
      Vox<span>donna</span>
    </a>
    <div style="display:flex;align-items:center;gap:20px">
      <div class="lang-switch" id="langSwitch"></div>
      <a href="blog.html" class="nav-back">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </a>
    </div>
  </nav>

  <div id="articleContent">
    <div class="loading">Loading article</div>
  </div>

  <script src="blog-data.js"></script>
  <script>
    // Parse query params: ?post=slug&lang=en
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('post');
    var lang = params.get('lang') || 'en';
    var langs = ['en', 'fr', 'it'];
    var langLabels = { en: 'EN', fr: 'FR', it: 'IT' };

    // Build language switcher
    var langSwitch = document.getElementById('langSwitch');
    langs.forEach(function(l) {
      var btn = document.createElement('a');
      btn.className = 'lang-btn' + (l === lang ? ' active' : '');
      btn.textContent = langLabels[l];
      btn.href = 'blog-post.html?post=' + slug + '&lang=' + l;
      langSwitch.appendChild(btn);
    });

    // Simple markdown to HTML converter
    function mdToHtml(md) {
      var html = md
        // Headers
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Horizontal rules
        .replace(/^---$/gm, '<hr>')
        // Bold + italic
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Images
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
        // Links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        // Blockquotes
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

      // Tables
      html = html.replace(/(\|.+\|\n)+/g, function(table) {
        var rows = table.trim().split('\n');
        if (rows.length < 2) return table;
        var out = '<table>';
        rows.forEach(function(row, i) {
          if (row.match(/^\|[\s-:|]+\|$/)) return; // separator row
          var cells = row.split('|').filter(function(c) { return c.trim() !== ''; });
          var tag = i === 0 ? 'th' : 'td';
          out += '<tr>';
          cells.forEach(function(c) { out += '<' + tag + '>' + c.trim() + '</' + tag + '>'; });
          out += '</tr>';
        });
        out += '</table>';
        return out;
      });

      // Unordered lists
      html = html.replace(/(^- .+\n?)+/gm, function(block) {
        var items = block.trim().split('\n').map(function(line) {
          return '<li>' + line.replace(/^- /, '') + '</li>';
        }).join('');
        return '<ul>' + items + '</ul>';
      });

      // Ordered lists
      html = html.replace(/(^\d+\. .+\n?)+/gm, function(block) {
        var items = block.trim().split('\n').map(function(line) {
          return '<li>' + line.replace(/^\d+\. /, '') + '</li>';
        }).join('');
        return '<ol>' + items + '</ol>';
      });

      // Paragraphs — wrap remaining text blocks
      html = html.split('\n\n').map(function(block) {
        block = block.trim();
        if (!block) return '';
        if (block.match(/^<(h[1-4]|ul|ol|table|blockquote|hr|pre|img)/)) return block;
        if (block.indexOf('<') === 0) return block;
        return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
      }).join('\n');

      // Merge consecutive blockquotes
      html = html.replace(/<\/blockquote>\s*<blockquote>/g, '<br>');

      return html;
    }

    // Parse frontmatter
    function parseFrontmatter(text) {
      var match = text.match(/^---\n([\s\S]+?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      var meta = {};
      match[1].split('\n').forEach(function(line) {
        var parts = line.match(/^(\w+):\s*"?([^"]*)"?$/);
        if (parts) meta[parts[1]] = parts[2];
      });
      return { meta: meta, body: match[2] };
    }

    // Render article from inline data
    function renderArticle(text) {
      var parsed = parseFrontmatter(text);
      var meta = parsed.meta;

      document.title = (meta.title || slug) + ' — Voxdonna AI';

      var dateStr = meta.date || '';
      if (dateStr) {
        var d = new Date(dateStr);
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        dateStr = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      }

      var heroHtml = '<div class="article-hero">'
        + '<div class="article-meta">'
        + (meta.category ? '<span class="article-category">' + meta.category + '</span>' : '')
        + (dateStr ? '<span class="article-date">' + dateStr + '</span>' : '')
        + (meta.readingTime ? '<span class="article-dot"></span><span class="article-read-time">' + meta.readingTime + ' min read</span>' : '')
        + '</div>'
        + '<h1>' + (meta.title || slug) + '</h1>'
        + (meta.description ? '<p class="article-desc">' + meta.description + '</p>' : '')
        + '</div>'
        + '<div class="article-divider"></div>';

      var bodyHtml = '<div class="article-content">' + mdToHtml(parsed.body) + '</div>';

      var footerHtml = '<div class="article-footer"><div class="article-footer-inner">'
        + '<a href="blog.html" class="back-link"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> All articles</a>'
        + '</div></div>';

      document.getElementById('articleContent').innerHTML = heroHtml + bodyHtml + footerHtml;
    }

    function showNotFound() {
      document.getElementById('articleContent').innerHTML =
        '<div class="loading" style="flex-direction:column;gap:12px">'
        + '<span style="font-size:18px;color:var(--text-primary)">Article not found</span>'
        + '<a href="blog.html" style="color:var(--copper-light)">Back to blog</a>'
        + '</div>';
    }

    if (slug) {
      var key = lang + '/' + slug;
      // Try inline data first (works on file:// protocol)
      if (typeof BLOG_DATA !== 'undefined' && BLOG_DATA[key]) {
        renderArticle(BLOG_DATA[key]);
      } else {
        // Fallback to fetch (works on http:// server)
        fetch('blog/' + lang + '/' + slug + '.md')
          .then(function(r) {
            if (!r.ok) throw new Error('Not found');
            return r.text();
          })
          .then(function(text) { renderArticle(text); })
          .catch(function() { showNotFound(); });
      }
    } else {
      document.getElementById('articleContent').innerHTML =
        '<div class="loading" style="flex-direction:column;gap:12px">'
        + '<span style="font-size:18px;color:var(--text-primary)">No article specified</span>'
        + '<a href="blog.html" style="color:var(--copper-light)">Back to blog</a>'
        + '</div>';
    }
  </script>
</body>
</html>
